name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      # Tests run against the committed BIS catalog database. The seed
      # script (scripts/seed-sample.ts) is only used as a fallback for
      # fresh checkouts that don't have data/bis.db — the test suite
      # expects >=50 rows which seed alone cannot provide.
      - run: |
          if [ ! -s data/bis.db ]; then
            echo "No committed database; seeding sample rows."
            npm run seed
          fi
      - run: npm test
